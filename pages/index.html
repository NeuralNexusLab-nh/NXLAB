<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NXLAB CONSOLE</title>
  <style>
    /* 全域駭客風樣式 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Courier New', Courier, monospace;
    }

    body {
      background-color: #050806;
      color: #39FF14; /* 經典亮綠 */
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* CRT 螢幕掃描線特效 */
    body::before {
      content: " ";
      display: block;
      position: absolute;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 10;
      background-size: 100% 4px, 6px 100%;
      pointer-events: none;
    }

    /* 右上角 Logo */
    .header {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 20;
    }

    .logo {
      color: #00E5FF; /* 淺藍色 */
      font-size: 2rem;
      font-weight: bold;
      text-decoration: none;
      text-shadow: 0 0 10px #00E5FF, 0 0 20px #00E5FF;
      transition: all 0.3s ease;
      display: inline-block;
      cursor: pointer;
    }

    .logo:hover {
      color: #39FF14;
      text-shadow: 0 0 10px #39FF14, 0 0 20px #39FF14;
      transform: scale(1.1);
    }

    /* 終端機主視窗 */
    .terminal {
      flex: 1;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      overflow-y: auto;
      z-index: 1;
    }

    /* 歡迎標題動畫 */
    .welcome-text {
      color: #00E5FF;
      text-shadow: 0 0 8px #00E5FF;
      margin-bottom: 20px;
      white-space: pre-line;
      animation: glow 2s ease-in-out infinite alternate;
    }

    /* 歷史輸出區 */
    .output-log {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .log-item {
      line-height: 1.4;
      word-break: break-all;
    }

    .command-sent {
      color: #00E5FF;
    }

    .response-success {
      color: #39FF14;
      text-shadow: 0 0 3px #39FF14;
    }

    .response-error {
      color: #FF1744;
      text-shadow: 0 0 5px #FF1744;
    }

    /* 指令輸入區 */
    .input-line {
      display: flex;
      align-items: center;
      margin-top: 15px;
    }

    .prompt {
      color: #00E5FF;
      margin-right: 10px;
      font-weight: bold;
      text-shadow: 0 0 5px #00E5FF;
    }

    .terminal-input {
      background: transparent;
      border: none;
      outline: none;
      color: #39FF14;
      font-family: inherit;
      font-size: 1rem;
      flex: 1;
      caret-color: #39FF14; /* 游標顏色 */
      text-shadow: 0 0 3px #39FF14;
    }

    /* 動畫效果定義 */
    @keyframes glow {
      from {
        text-shadow: 0 0 5px #00E5FF, 0 0 10px #00E5FF;
      }
      to {
        text-shadow: 0 0 10px #00E5FF, 0 0 20px #00E5FF, 0 0 30px #00E5FF;
      }
    }
